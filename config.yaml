# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: orbs-indexer
description: Orbs Protocol Indexer (Delegations, Committee, TWAP, Liquidity Hub)

field_selection:
  transaction_fields:
    - hash
    - input

contracts:
  # === DELEGATIONS ===
  - name: Delegations
    abi_file_path: ./abis/Delegations.json
    events:
      - event: ContractRegistryAddressUpdated(address addr)
      - event: Delegated(address indexed sender, address indexed recipient)
      - event: DelegatedStakeChanged(address indexed addr, uint256 selfDelegatedStake, uint256 delegatedStake, address indexed delegator, uint256 delegatorContributedStake)
      - event: DelegationInitialized(address indexed sender, address indexed recipient)
      - event: InitializationComplete()
      - event: Locked()
      - event: RegistryManagementTransferred(address indexed previousRegistryAdmin, address indexed newRegistryAdmin)
      - event: Unlocked()

  # === COMMITTEE ===
  - name: Committee
    abi_file_path: ./abis/Committee.json
    events:
      - event: CommitteeChange(address indexed addr, uint256 weight, bool certification, bool inCommittee)
      - event: ContractRegistryAddressUpdated(address addr)
      - event: InitializationComplete()
      - event: Locked()
      - event: MaxCommitteeSizeChanged(uint8 newValue, uint8 oldValue)
      - event: RegistryManagementTransferred(address indexed previousRegistryAdmin, address indexed newRegistryAdmin)
      - event: Unlocked()

  # === CONTRACT REGISTRY ===
  - name: OrbsContractRegistry
    abi_file_path: ./abis/ContractRegistry.json
    events:
      - event: ContractAddressUpdated(string contractName, address addr, bool managedContract)
      - event: ContractRegistryUpdated(address newContractRegistry)
      - event: ManagerChanged(string role, address newManager)

  # === ELECTIONS ===
  - name: Elections
    abi_file_path: ./abis/Elections.json
    events:
      - event: ContractRegistryAddressUpdated(address addr)
      - event: GuardianStatusUpdated(address indexed guardian, bool readyToSync, bool readyForCommittee)
      - event: GuardianVotedOut(address indexed guardian)
      - event: GuardianVotedUnready(address indexed guardian)
      - event: InitializationComplete()
      - event: Locked()
      - event: MinSelfStakePercentMilleChanged(uint32 newValue, uint32 oldValue)
      - event: RegistryManagementTransferred(address indexed previousRegistryAdmin, address indexed newRegistryAdmin)
      - event: StakeChanged(address indexed addr, uint256 selfDelegatedStake, uint256 delegatedStake, uint256 effectiveStake)
      - event: Unlocked()
      - event: VoteOutCasted(address indexed voter, address indexed subject)
      - event: VoteOutPercentMilleThresholdChanged(uint32 newValue, uint32 oldValue)
      - event: VoteUnreadyCasted(address indexed voter, address indexed subject, uint256 expiration)
      - event: VoteUnreadyPercentMilleThresholdChanged(uint32 newValue, uint32 oldValue)
      - event: VoteUnreadyTimeoutSecondsChanged(uint32 newValue, uint32 oldValue)

  # === SUBSCRIPTIONS ===
  - name: OrbsSubscriptions
    abi_file_path: ./abis/Subscriptions.json
    events:
      - event: ContractRegistryAddressUpdated(address addr)
      - event: GenesisRefTimeDelayChanged(uint256 newGenesisRefTimeDelay)
      - event: InitializationComplete()
      - event: Locked()
      - event: MinimumInitialVcPaymentChanged(uint256 newMinimumInitialVcPayment)
      - event: Payment(uint256 indexed vcId, address by, uint256 amount, string tier, uint256 rate)
      - event: RegistryManagementTransferred(address indexed previousRegistryAdmin, address indexed newRegistryAdmin)
      - event: SubscriberAdded(address subscriber)
      - event: SubscriberRemoved(address subscriber)
      - event: SubscriptionChanged(uint256 indexed vcId, address owner, string name, uint256 genRefTime, string tier, uint256 rate, uint256 expiresAt, bool isCertified, string deploymentSubset)
      - event: Unlocked()
      - event: VcConfigRecordChanged(uint256 indexed vcId, string key, string value)
      - event: VcCreated(uint256 indexed vcId)
      - event: VcOwnerChanged(uint256 indexed vcId, address previousOwner, address newOwner)

  # === PROTOCOL ===
  - name: Protocol
    abi_file_path: ./abis/Protocol.json
    events:
      - event: ContractRegistryAddressUpdated(address addr)
      - event: InitializationComplete()
      - event: Locked()
      - event: ProtocolVersionChanged(string deploymentSubset, uint256 currentVersion, uint256 nextVersion, uint256 fromTimestamp)
      - event: RegistryManagementTransferred(address indexed previousRegistryAdmin, address indexed newRegistryAdmin)
      - event: Unlocked()

  # === GUARDIANS REGISTRATION ===
  - name: GuardiansRegistration
    abi_file_path: ./abis/GuardiansRegistration.json
    events:
      - event: ContractRegistryAddressUpdated(address addr)
      - event: GuardianDataUpdated(address indexed guardian, bool isRegistered, bytes4 ip, address orbsAddr, string name, string website, uint256 registrationTime)
      - event: GuardianMetadataChanged(address indexed guardian, string key, string newValue, string oldValue)
      - event: GuardianRegistered(address indexed guardian)
      - event: GuardianUnregistered(address indexed guardian)
      - event: InitializationComplete()
      - event: Locked()
      - event: RegistryManagementTransferred(address indexed previousRegistryAdmin, address indexed newRegistryAdmin)
      - event: Unlocked()

  # === CERTIFICATION ===
  - name: Certification
    abi_file_path: ./abis/Certification.json
    events:
      - event: ContractRegistryAddressUpdated(address addr)
      - event: GuardianCertificationUpdate(address indexed guardian, bool isCertified)
      - event: InitializationComplete()
      - event: Locked()
      - event: RegistryManagementTransferred(address indexed previousRegistryAdmin, address indexed newRegistryAdmin)
      - event: Unlocked()

  # === TWAP ===
  - name: TwapContract
    abi_file_path: ./abis/TWAP.json
    events:
      - event: OrderFilled(uint64 indexed id, address indexed maker, address indexed exchange, address taker, uint256 srcAmountIn, uint256 dstAmountOut, uint256 dstFee, uint256 srcFilledAmount)
      - event: OrderCreated(uint64 indexed id, address indexed maker, address indexed exchange, (address,address,address,uint256,uint256,uint256,uint32,uint32,uint32,bytes) ask)
      - event: OrderCanceled(uint64 indexed id, address indexed maker, address exchange)
      - event: OrderCompleted(uint64 indexed id, address indexed maker, address indexed exchange, address taker)

  # === LIQUIDITY HUB: REACTOR ===
  - name: Reactor
    abi_file_path: ./abis/ExclusiveDutchOrderReactor.json
    events:
      - event: Fill(bytes32 indexed orderHash, address indexed filler, address indexed swapper, uint256 nonce)

  # === LIQUIDITY HUB: EXECUTOR V5 ===
  - name: ExecutorV5
    abi_file_path: ./abis/Executor.json
    events:
      - event: Resolved(bytes32 indexed orderHash, address indexed swapper, address indexed ref, address inToken, address outToken, uint256 inAmount, uint256 outAmount)
      - event: Surplus(address indexed swapper, address indexed ref, address indexed token, uint256 amount, uint256 refshare)

  # === LIQUIDITY HUB: EXECUTOR V6 ===
  - name: ExecutorV6
    abi_file_path: ./abis/ExecutorV6.json
    events:
      - event: ExtraOut(address indexed recipient, address token, uint256 amount)
      - event: Resolved(bytes32 indexed orderHash, address indexed swapper, address indexed ref, address inToken, address outToken, uint256 inAmount, uint256 outAmount)
        name: ResolvedV6
      - event: Surplus(address indexed swapper, address ref, address token, uint256 amount, uint256 refshare)
        name: SurplusV6

